name: Poll CBOE options (V2 binary)

on:
  schedule:
    # Toutes les 5 min, 24h/24, lundi-vendredi (UTC)
    - cron: '*/5 * * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Fetch and persist
        run: python poll.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase
          git add data/
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "poll $(date -u +%Y-%m-%d\ %H:%M\ UTC)"
            git push
          fi
